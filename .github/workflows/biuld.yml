name: Build Napster Config Generator

on:
  push:
    branches: [ main, master ]
  release:
    types: [ created ]
  workflow_dispatch:

jobs:
  build:
    name: Build for all platforms
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: 📦 Download dependencies
        run: go mod download

      - name: 🪟 Build Windows (64-bit)
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: 0
        run: |
          go build -ldflags="-s -w" -o napster-config-windows-amd64.exe .

      - name: 🪟 Build Windows (32-bit)
        env:
          GOOS: windows
          GOARCH: 386
          CGO_ENABLED: 0
        run: |
          go build -ldflags="-s -w" -o napster-config-windows-386.exe .

      - name: 🐧 Build Linux (64-bit)
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: 0
        run: |
          go build -ldflags="-s -w" -o napster-config-linux-amd64 .

      - name: 🍎 Build macOS (Apple Silicon)
        env:
          GOOS: darwin
          GOARCH: arm64
          CGO_ENABLED: 0
        run: |
          go build -ldflags="-s -w" -o napster-config-macos-arm64 .

      - name: 🍎 Build macOS (Intel)
        env:
          GOOS: darwin
          GOARCH: amd64
          CGO_ENABLED: 0
        run: |
          go build -ldflags="-s -w" -o napster-config-macos-amd64 .

      - name: 📤 Upload all artifacts
        uses: actions/upload-artifact@v4
        with:
          name: napster-config-all-builds
          path: |
            napster-config-windows-amd64.exe
            napster-config-windows-386.exe
            napster-config-linux-amd64
            napster-config-macos-arm64
            napster-config-macos-amd64
          retention-days: 30

      - name: 🚀 Upload to Release (if triggered by release)
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: |
            napster-config-windows-amd64.exe
            napster-config-windows-386.exe
            napster-config-linux-amd64
            napster-config-macos-arm64
            napster-config-macos-amd64
